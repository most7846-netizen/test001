<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>업무용 코멘트 카메라</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="업무카메라">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/685/685655.png">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        /* 비율 조절을 위한 비디오 컨테이너 스타일 */
        .video-container {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-center: center;
            overflow: hidden;
            background-color: #000;
            transition: all 0.3s ease;
        }
        /* 각 비율별 클래스 (모바일 세로형 기준 표준 규격) */
        .ratio-3-4 { aspect-ratio: 3 / 4; max-height: 65vh; }
        .ratio-9-16 { aspect-ratio: 9 / 16; max-height: 70vh; }
        .ratio-full { width: 100vw; height: calc(100vh - 180px); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col justify-between antialiased">

    <header class="bg-gray-800 px-4 py-3 text-center shadow-md">
        <h1 class="text-sm font-semibold tracking-wide">📸 코멘트 합성 카메라</h1>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center bg-black relative overflow-hidden">
        
        <div id="ratio-selector" class="w-full max-w-md px-4 py-2 bg-gray-900/80 backdrop-blur-md flex justify-around border-b border-gray-800 text-xs font-semibold z-10">
            <button onclick="changeRatio('3:4')" id="btn-ratio-3-4" class="px-4 py-1.5 rounded-full bg-blue-600 text-white transition">3:4</button>
            <button onclick="changeRatio('9:16')" id="btn-ratio-9-16" class="px-4 py-1.5 rounded-full text-gray-400 hover:text-white transition">9:16</button>
            <button onclick="changeRatio('FULL')" id="btn-ratio-full" class="px-4 py-1.5 rounded-full text-gray-400 hover:text-white transition">FULL</button>
        </div>

        <div id="video-box" class="video-container ratio-3-4 mx-auto my-auto">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
        </div>
        
        <div id="preview-container" class="hidden absolute inset-0 bg-black/95 p-4 flex flex-col justify-between z-50">
            <div class="flex-1 flex flex-col items-center justify-center space-y-4">
                <p class="text-xs text-amber-400 font-medium">✨ 입력한 코멘트가 사진 하단에 합성됩니다.</p>
                <canvas id="canvas" class="max-w-full max-h-[55vh] object-contain rounded-lg border border-gray-700 shadow-xl"></canvas>
                
                <div class="w-full max-w-md bg-gray-800 p-3 rounded-xl border border-gray-700">
                    <label class="block text-xs font-medium text-gray-400 mb-1">사진에 박을 코멘트 입력</label>
                    <input type="text" id="comment-input" placeholder="예: A구역 도장면 결함 발견" 
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-400 focus:outline-hidden focus:border-blue-500">
                </div>
            </div>

            <div class="flex gap-4 max-w-md mx-auto w-full pt-4">
                <button id="btn-cancel" class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-xl font-medium text-sm transition">🔄 다시 찍기</button>
                <button id="btn-save" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-sm transition text-white shadow-lg">💾 합성 및 저장</button>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 px-6 py-6 flex justify-center items-center shadow-inner">
        <button id="btn-capture" class="w-16 h-16 bg-white hover:bg-gray-200 rounded-full flex items-center justify-center p-1 shadow-2xl transition transform active:scale-95">
            <div class="w-full h-full rounded-full border-2 border-gray-800 bg-white"></div>
        </button>
    </footer>

    <script>
        const video = document.getElementById('video');
        const videoBox = document.getElementById('video-box');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const previewContainer = document.getElementById('preview-container');
        const commentInput = document.getElementById('comment-input');
        const btnCapture = document.getElementById('btn-capture');
        const btnCancel = document.getElementById('btn-cancel');
        const btnSave = document.getElementById('btn-save');

        let rawImage = null;
        let currentRatio = "3:4"; // 기본 비율

        // 1. 화면 비율 변경 기능
        function changeRatio(ratio) {
            currentRatio = ratio;
            
            // 모든 선택 버튼 스타일 초기화
            ['3-4', '9-16', 'full'].forEach(r => {
                const btn = document.getElementById(`btn-ratio-${r}`);
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('text-gray-400');
            });
            
            // 선택한 버튼 활성화
            const activeBtn = document.getElementById(`btn-ratio-${ratio.replace(':', '-')}`);
            activeBtn.classList.remove('text-gray-400');
            activeBtn.classList.add('bg-blue-600', 'text-white');

            // 뷰파인더 스타일 변경
            videoBox.className = "video-container mx-auto my-auto"; // 클래스 리셋
            if (ratio === '3:4') videoBox.classList.add('ratio-3-4');
            else if (ratio === '9:16') videoBox.classList.add('ratio-9-16');
            else if (ratio === 'FULL') videoBox.classList.add('ratio-full');
        }

        // 2. 페이지 로드 시 카메라 즉시 자동 구동
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error(err);
                if(location.protocol !== 'https:' && location.hostname !== 'localhost') {
                    alert("🔒 보안 에러: 반드시 https:// 주소로 접속해야 카메라가 작동합니다. GitHub Pages 설정을 확인해주세요.");
                } else {
                    alert("🚫 권한 거부: 스마트폰 브라우저 설정에서 카메라 권한을 [허용]으로 변경해주세요.");
                }
            }
        }

        // 3. 사진 촬영 (현재 지정된 비율 영역만 크롭 및 복사)
        btnCapture.addEventListener('click', () => {
            if(!video.srcObject) return;

            const tempCanvas = document.createElement('canvas');
            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            
            let targetWidth = videoWidth;
            let targetHeight = videoHeight;
            let startX = 0;
            let startY = 0;

            // 선택된 비율에 따라 하드웨어 카메라 영상 이미지 크롭 연산
            if (currentRatio === "3:4") {
                targetHeight = videoWidth * (4 / 3);
                if(targetHeight > videoHeight) {
                    targetHeight = videoHeight;
                    targetWidth = videoHeight * (3 / 4);
                }
                startX = (videoWidth - targetWidth) / 2;
                startY = (videoHeight - targetHeight) / 2;
            } else if (currentRatio === "9:16") {
                targetHeight = videoWidth * (16 / 9);
                if(targetHeight > videoHeight) {
                    targetHeight = videoHeight;
                    targetWidth = videoHeight * (9 / 16);
                }
                startX = (videoWidth - targetWidth) / 2;
                startY = (videoHeight - targetHeight) / 2;
            } // FULL 비율은 크롭 없이 비디오 풀 해상도 전체 사용

            tempCanvas.width = targetWidth;
            tempCanvas.height = targetHeight;
            const tempCtx = tempCanvas.getContext('2d');
            
            // 비디오 화면의 중앙을 기준으로 계산된 비율만큼만 뜯어서 캔버스에 그림
            tempCtx.drawImage(video, startX, startY, targetWidth, targetHeight, 0, 0, targetWidth, targetHeight);
            
            rawImage = new Image();
            rawImage.src = tempCanvas.toDataURL('image/jpeg');
            rawImage.onload = () => {
                previewContainer.classList.remove('hidden');
                commentInput.value = "";
                commentInput.focus();
                updateCompositeImage();
            };
        });

        // 4. 워터마크 텍스트 합성
        function updateCompositeImage() {
            if (!rawImage) return;

            canvas.width = rawImage.width;
            canvas.height = rawImage.height;
            ctx.drawImage(rawImage, 0, 0);

            // 이미지 비율에 따라 하단 반투명 바 크기 조정
            const barHeight = canvas.height * 0.11;
            ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
            ctx.fillRect(0, canvas.height - barHeight, canvas.width, barHeight);

            ctx.fillStyle = "#ffffff";
            ctx.textBaseline = "middle";
            const fontSize = Math.max(18, Math.floor(canvas.height * 0.032));
            ctx.font = `bold ${fontSize}px sans-serif`;

            const commentText = commentInput.value.trim() || "현장 검수 사진";
            const now = new Date();
            const dateText = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            const paddingX = canvas.width * 0.04;
            const textY = canvas.height - (barHeight / 2);

            ctx.textAlign = "left";
            ctx.fillText(commentText, paddingX, textY);

            ctx.textAlign = "right";
            ctx.font = `${fontSize * 0.8}px sans-serif`;
            ctx.fillStyle = "#e2e8f0";
            ctx.fillText(dateText, canvas.width - paddingX, textY);
        }

        commentInput.addEventListener('input', updateCompositeImage);

        btnCancel.addEventListener('click', () => {
            previewContainer.classList.add('hidden');
            rawImage = null;
        });

        btnSave.addEventListener('click', () => {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            const now = new Date();
            const fileName = `IMG_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.jpg`;
            
            link.href = dataUrl;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert("사진이 갤러리에 저장되었습니다.");
            previewContainer.classList.add('hidden');
            rawImage = null;
        });

        // 앱 시작 시 카메라 즉시 구동 연동
        window.addEventListener('DOMContentLoaded', initCamera);
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => { console.log('서비스 워커 등록 성공:', registration.scope); })
                    .catch((error) => { console.error('서비스 워커 등록 실패:', error); });
            });
        }
    </script>
</body>
</html>
