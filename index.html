<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>업무용 코멘트 카메라</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="업무카메라">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/685/685655.png">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col justify-between antialiased">

    <header class="bg-gray-800 px-4 py-3 text-center shadow-md">
        <h1 class="text-sm font-semibold tracking-wide">📸 코멘트 합성 카메라</h1>
    </header>

    <main class="flex-1 flex items-center justify-center p-2 bg-black relative overflow-hidden">
        <div id="start-prompt" class="absolute z-10 text-center space-y-4 p-4">
            <p class="text-sm text-gray-400 leading-relaxed">안전한 사내 카메라 사용을 위해<br>아래 버튼을 눌러 권한을 승인해주세요.</p>
            <button onclick="initCamera()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg transition transform active:scale-95">
                📸 카메라 시작하기
            </button>
        </div>

        <video id="video" autoplay playsinline class="w-full max-h-[70vh] object-contain rounded-lg shadow-2xl"></video>
        
        <div id="preview-container" class="hidden absolute inset-0 bg-black/90 p-4 flex flex-col justify-between z-50">
            <div class="flex-1 flex flex-col items-center justify-center space-y-4">
                <p class="text-xs text-amber-400 font-medium">✨ 입력한 코멘트가 사진 하단에 합성됩니다.</p>
                <canvas id="canvas" class="max-w-full max-h-[55vh] object-contain rounded-lg border border-gray-700 shadow-xl"></canvas>
                
                <div class="w-full max-w-md bg-gray-800 p-3 rounded-xl border border-gray-700">
                    <label class="block text-xs font-medium text-gray-400 mb-1">사진에 박을 코멘트 입력</label>
                    <input type="text" id="comment-input" placeholder="예: A구역 도장면 결함 발견" 
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-400 focus:outline-hidden focus:border-blue-500">
                </div>
            </div>

            <div class="flex gap-4 max-w-md mx-auto w-full pt-4">
                <button id="btn-cancel" class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-xl font-medium text-sm transition">🔄 다시 찍기</button>
                <button id="btn-save" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-sm transition text-white shadow-lg">💾 합성 및 저장</button>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 px-6 py-6 flex justify-center items-center shadow-inner">
        <button id="btn-capture" class="w-16 h-16 bg-white hover:bg-gray-200 rounded-full flex items-center justify-center p-1 shadow-2xl transition transform active:scale-95">
            <div class="w-full h-full rounded-full border-2 border-gray-800 bg-white"></div>
        </button>
    </footer>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const previewContainer = document.getElementById('preview-container');
        const commentInput = document.getElementById('comment-input');
        const btnCapture = document.getElementById('btn-capture');
        const btnCancel = document.getElementById('btn-cancel');
        const btnSave = document.getElementById('btn-save');

        let rawImage = null;

        // 카메라 권한 요청 및 구동
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
                document.getElementById('start-prompt').classList.add('hidden');
            } catch (err) {
                console.error(err);
                if(location.protocol !== 'https:' && location.hostname !== 'localhost') {
                    alert("🔒 보안 에러: 반드시 https:// 주소로 접속해야 카메라가 작동합니다. GitHub Pages 설정을 확인해주세요.");
                } else {
                    alert("🚫 권한 거부: 스마트폰 브라우저 설정에서 카메라 권한을 [허용]으로 변경해주세요.");
                }
            }
        }

        // 사진 캡처
        btnCapture.addEventListener('click', () => {
            if(!video.srcObject) {
                alert("먼저 '카메라 시작하기' 버튼을 눌러주세요.");
                return;
            }
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
            
            rawImage = new Image();
            rawImage.src = tempCanvas.toDataURL('image/jpeg');
            rawImage.onload = () => {
                previewContainer.classList.remove('hidden');
                commentInput.value = "";
                commentInput.focus();
                updateCompositeImage();
            };
        });

        // 워터마크 텍스트 합성
        function updateCompositeImage() {
            if (!rawImage) return;

            canvas.width = rawImage.width;
            canvas.height = rawImage.height;
            ctx.drawImage(rawImage, 0, 0);

            const barHeight = canvas.height * 0.12;
            ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
            ctx.fillRect(0, canvas.height - barHeight, canvas.width, barHeight);

            ctx.fillStyle = "#ffffff";
            ctx.textBaseline = "middle";
            const fontSize = Math.max(20, Math.floor(canvas.height * 0.035));
            ctx.font = `bold ${fontSize}px sans-serif`;

            const commentText = commentInput.value.trim() || "현장 검수 사진";
            const now = new Date();
            const dateText = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            const paddingX = canvas.width * 0.04;
            const textY = canvas.height - (barHeight / 2);

            ctx.textAlign = "left";
            ctx.fillText(commentText, paddingX, textY);

            ctx.textAlign = "right";
            ctx.font = `${fontSize * 0.8}px sans-serif`;
            ctx.fillStyle = "#e2e8f0";
            ctx.fillText(dateText, canvas.width - paddingX, textY);
        }

        commentInput.addEventListener('input', updateCompositeImage);

        btnCancel.addEventListener('click', () => {
            previewContainer.classList.add('hidden');
            rawImage = null;
        });

        btnSave.addEventListener('click', () => {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            const now = new Date();
            const fileName = `IMG_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.jpg`;
            
            link.href = dataUrl;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert("사진이 갤러리에 저장되었습니다.");
            previewContainer.classList.add('hidden');
            rawImage = null;
        });
    </script>
</body>
</html>
